<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Optimized viewport for iPhone with safe areas -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AgentOS">
  
  <!-- Android/Chrome PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="AgentOS">
  <meta name="theme-color" content="#ef4444" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  
  <!-- Format detection -->
  <meta name="format-detection" content="telephone=no">
  
  <!-- Prevent translation -->
  <meta name="google" content="notranslate">
  
  <!-- iOS Splash Screen -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  
  <!-- iOS Splash Screens for various devices -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 440 956'%3E%3Crect width='440' height='956' fill='%230f172a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='120' fill='%23ef4444'%3E⬡%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 430 932'%3E%3Crect width='430' height='932' fill='%230f172a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='120' fill='%23ef4444'%3E⬡%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 414 896'%3E%3Crect width='414' height='896' fill='%230f172a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='110' fill='%23ef4444'%3E⬡%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 414 896'%3E%3Crect width='414' height='896' fill='%230f172a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='110' fill='%23ef4444'%3E⬡%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 393 852'%3E%3Crect width='393' height='852' fill='%230f172a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='110' fill='%23ef4444'%3E⬡%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 390 844'%3E%3Crect width='390' height='844' fill='%230f172a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='110' fill='%23ef4444'%3E⬡%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 375 812'%3E%3Crect width='375' height='812' fill='%230f172a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='100' fill='%23ef4444'%3E⬡%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 375 667'%3E%3Crect width='375' height='667' fill='%230f172a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='90' fill='%23ef4444'%3E⬡%3C/text%3E%3C/svg%3E">
  
  <meta name="theme-color" content="#ef4444">
  <link rel="manifest" href="/manifest.json">
  <title>AgentOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- PIN Overlay -->
  <div id="pinOverlay" class="pin-overlay hidden">
    <div class="pin-screen">
      <div class="pin-app-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#ef4444" opacity="0.5"/>
          <path d="M2 17L12 22L22 17" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
          <path d="M2 12L12 17L22 12" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="7" r="2" fill="#ef4444"/>
        </svg>
      </div>
      <h1 class="pin-title">AgentOS</h1>
      <p class="pin-subtitle">Enter PIN to access</p>
      <p class="pin-dots-label">PIN CODE</p>
      <div class="pin-dots" id="pinDots">
        <span class="pin-dot" data-index="0"></span>
        <span class="pin-dot" data-index="1"></span>
        <span class="pin-dot" data-index="2"></span>
        <span class="pin-dot" data-index="3"></span>
      </div>
      <p id="pinError" class="pin-error hidden">Incorrect PIN</p>
      <div class="pin-keypad">
        <button class="pin-key" data-digit="1">1</button>
        <button class="pin-key" data-digit="2">2</button>
        <button class="pin-key" data-digit="3">3</button>
        <button class="pin-key" data-digit="4">4</button>
        <button class="pin-key" data-digit="5">5</button>
        <button class="pin-key" data-digit="6">6</button>
        <button class="pin-key" data-digit="7">7</button>
        <button class="pin-key" data-digit="8">8</button>
        <button class="pin-key" data-digit="9">9</button>
        <button class="pin-key pin-key-back" id="pinBackspace">⌫</button>
        <button class="pin-key" data-digit="0">0</button>
        <button class="pin-key pin-key-ok" id="pinSubmit">OK</button>
      </div>
      <p class="pin-footer">Access restricted to authorized personnel only</p>
    </div>
  </div>

  <!-- Unified Header -->
  <div class="header-container" id="headerContainer">
    <span class="header-brand">⬡ AgentOS</span>
    <div class="header-filters">
      <select id="projectSelect"><option value="">Loading...</option></select>
      <div class="assignee-filter" id="assigneeFilter">
        <button class="af-btn active" data-value="">All</button>
        <button class="af-btn" data-value="org">🤖 Org</button>
        <button class="af-btn" data-value="claude">🧠 Claude</button>
      </div>
    </div>
    <!-- Theme toggle: hidden on mobile via CSS, kept for desktop -->
    <button class="theme-toggle" id="themeToggle">&#9790;</button>
  </div>

  <!-- Mobile Filter Bar (column tabs) -->
  <div class="filter-bar" id="filterBar"></div>

  <!-- Legacy header for desktop compatibility (hidden on mobile) -->
  <header class="desktop-header">
    <h1 class="brand">
      <span class="brand-name">AgentOS</span>
    </h1>
    <div class="header-actions">
      <div class="tabs" id="viewTabs">
        <button class="tab active" data-view="board">Board</button>
        <button class="tab" data-view="agents">Agents</button>
        <button class="tab" data-view="stats">Stats</button>
      </div>
      <button class="theme-toggle" id="themeToggleDesktop">&#9790;</button>
    </div>
  </header>

  <div class="project-bar" id="projectBar">
    <select id="projectSelectDesktop"><option value="">Loading...</option></select>
    <div class="assignee-filter" id="assigneeFilterDesktop">
        <button class="af-btn active" data-value="">All</button>
        <button class="af-btn" data-value="org">🤖 Org</button>
        <button class="af-btn" data-value="claude">🧠 Claude</button>
      </div>
    <button id="newProjectBtn">+ Project</button>
    <button id="newTaskBtn">+ Task</button>
    <label class="archive-toggle" id="archiveToggleLabel"><input type="checkbox" id="archiveToggle"> Show archived</label>
  </div>

  <!-- Pull to refresh indicator -->
  <div class="ptr-indicator" id="ptrIndicator">
    <div class="ptr-spinner"></div>
    <span>Pull to refresh</span>
  </div>

  <!-- Kanban view -->
  <div class="board ptr-container" id="boardView"></div>

  <!-- Agents view -->
  <div class="agent-grid hidden" id="agentsView"></div>

  <!-- Stats view -->
  <div class="stats-view hidden" id="statsView"></div>

  <!-- Backdrop for detail panel (mobile) -->
  <div class="detail-backdrop" id="detailBackdrop"></div>

  <!-- Task detail panel -->
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" id="closeDetail" aria-label="Close">&#x2715;</button>
    <div id="detailContent"></div>
  </div>

  <!-- Hidden file input for attachment upload -->
  <input type="file" id="attachFileInput" accept="image/*,.pdf" style="display:none">

  <!-- Bottom Navigation Bar (mobile only) -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="bottom-nav-item active" data-view="board" aria-label="Tasks">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>Tasks</span>
    </button>
    <button class="bottom-nav-item" data-view="agents" aria-label="Agents">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="7" r="4"/>
        <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
        <circle cx="19" cy="11" r="2"/>
        <path d="M23 21v-1a3 3 0 0 0-3-3h-1"/>
      </svg>
      <span>Agents</span>
    </button>
    <button class="bottom-nav-item" data-view="stats" aria-label="Stats">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span>Stats</span>
    </button>
    <button class="bottom-nav-item bottom-nav-add" id="navAddBtn" aria-label="Add Task">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>Add</span>
    </button>
  </nav>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered:', registration.scope);
          })
          .catch((error) => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
